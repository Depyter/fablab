name: format, lint, build, test
run-name: ${{ github.actor}} adding new features into the projects 🚀
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use bun latest
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format Check
        run: bun run format:check

      - name: Lint Check
        run: bun run lint

      - name: Build project
        run: bun run build

      - name: Run Vitest
        run: bun run vitest

