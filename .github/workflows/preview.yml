name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies and Next cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-preview-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-preview-
            ${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex preview and build worker
        run: bunx convex deploy --cmd "bun run build:worker:preview"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}

      - name: Upload Cloudflare preview worker version
        id: cloudflare_preview
        shell: bash
        run: |
          set -euo pipefail
          bun run upload:worker:preview | tee upload.log
          preview_url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' upload.log | head -n1 || true)"
          worker_version_id="$(sed -n 's/^Worker Version ID: //p' upload.log | tail -n1)"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "worker_version_id=$worker_version_id" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.cloudflare_preview.outputs.preview_url }}
          WORKER_VERSION_ID: ${{ steps.cloudflare_preview.outputs.worker_version_id }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview-url -->';
            const previewUrl = process.env.PREVIEW_URL?.trim();
            const workerVersionId = process.env.WORKER_VERSION_ID?.trim();
            const body = previewUrl
              ? `${marker}
            **Cloudflare preview**: ${previewUrl}

            - Built inside Convex preview deployment context.
            - This is a versioned preview URL and will change on the next preview upload.`
              : `${marker}
            **Cloudflare preview upload succeeded**, but the CLI did not print a preview URL.

            - Worker version ID: \`${workerVersionId || 'unknown'}\`
            - Built inside Convex preview deployment context.
            - Check the Cloudflare Worker deployments/versions UI for the generated preview URL.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
