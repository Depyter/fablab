name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies and Next cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-preview-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-preview-
            ${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex preview and build worker
        run: bunx convex deploy --cmd "bun run build:worker:preview"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}

      - name: Set preview site URL in Convex preview deployment
        run: |
          PREVIEW_URL="https://pr-${{ github.event.pull_request.number }}-fablab-preview.acabalharleyvan.workers.dev"
          bunx convex env set --preview-name "${{ github.head_ref }}" CURRENT_SITE_URL "$PREVIEW_URL"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}

      - name: Upload Cloudflare preview worker version
        id: cloudflare_preview
        shell: bash
        env:
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bun run upload:worker:preview -- --preview-alias "$PREVIEW_ALIAS" | tee upload.log
          preview_url="https://${PREVIEW_ALIAS}-fablab-preview.acabalharleyvan.workers.dev"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.cloudflare_preview.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview-url -->';
            const previewUrl = process.env.PREVIEW_URL?.trim();
            const body = `${marker}
            **Cloudflare preview**: ${previewUrl}

            - Built inside Convex preview deployment context.
            - This is a stable PR alias URL backed by Cloudflare preview versions.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
